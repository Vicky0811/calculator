apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-calculator
  labels:
    app: java-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-calculator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: java-calculator
    spec:
      containers:
        - name: java-calculator
          image: YOUR_DOCKERHUB_USERNAME/java-calculator:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20